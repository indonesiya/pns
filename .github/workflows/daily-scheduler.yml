name: Daily Scheduled Post Publisher

on:
  schedule:
    - cron: "0 1 * * *"  # setiap hari jam 01:00 UTC
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move scheduled posts (daily mode)
        run: |
          TODAY=$(date -u +"%Y-%m-%d")

          echo "Today (UTC): $TODAY"

          mkdir -p _posts

          for file in $(find _scheduled -name "*.md"); do

            publish_at=$(grep -m 1 "^publish_at:" "$file" | sed 's/publish_at: //')

            if [ -z "$publish_at" ]; then
              echo "Skip: $file (no publish_at)"
              continue
            fi

            publish_date=$(date -d "$publish_at" +"%Y-%m-%d" 2>/dev/null)

            if [ -z "$publish_date" ]; then
              echo "Invalid date: $file"
              continue
            fi

            # hanya cek HARI (bukan jam)
            if [ "$publish_date" == "$TODAY" ] || [ "$publish_date" \< "$TODAY" ]; then
              echo "Publishing today: $file"

              filename=$(basename "$file")

              mv "$file" "_posts/$filename"
            else
              echo "Not yet: $file"
            fi

          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet || git commit -m "Daily auto publish posts"

      - name: Push changes
        run: |
          git push