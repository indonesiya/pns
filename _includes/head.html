<head>
  <meta charset="utf-8" />

  <!-- Google & Yandex Verification -->
  <meta name="google-adsense-account" content="ca-pub-3956807637449855">
  <meta name="msvalidate.01" content="FC20DAEEE2233B488788E95BEF63555B" />
  <meta name="yandex-verification" content="b446a231dda7e3fc" />

  <!-- VIEWPORT -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- SEO BASIC -->
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}" />
  <meta name="keywords" content="ASN, CPNS, PPPK, PNS, kebijakan, formasi, gaji, karier, pemerintahan, indonesia" />
  <meta name="author" content="{{ site.title }}" />
  <meta name="robots" content="index, follow" />

  <!-- CANONICAL -->
  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  {% seo %}

  <!-- OPEN GRAPH (Facebook / WhatsApp) -->
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description"
    content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}" />
  <meta property="og:image" content="{{ page.image | default: site.logo | absolute_url }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="{{ site.title }}" />

  <!-- TWITTER CARD -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.title | default: site.title }}" />
  <meta name="twitter:description"
    content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}" />
  <meta name="twitter:image" content="{{ page.image | default: site.logo | absolute_url }}" />

  <!-- FAVICON -->
  <link rel="icon" href="{{ site.url }}{{ site.baseurl }}/assets/images/favicon.ico" type="image/x-icon" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Font: Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

  <!-- jQuery migrate (optional) -->
  <script src="//cdnjs.cloudflare.com/ajax/libs/jquery-migrate/3.3.2/jquery-migrate.min.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3956807637449855"
    crossorigin="anonymous"></script>
</head>
