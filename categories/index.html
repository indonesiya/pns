---
layout: default
title: Kategori
permalink: /categories/
---

<div class="my-5">

  <h6 class="fw-bold text-uppercase mb-3">
    <span class="text-danger">/</span>
    <span id="category-title">KATEGORI</span>
    <span class="text-danger">/</span>
  </h6>

  <div class="row g-4" id="post-list"></div>

</div>

<script>
const hash = window.location.hash.replace("#", "").toLowerCase();

const allPosts = [
  {% for post in site.posts %}
  {
    title: `{{ post.title | escape }}`,
    url: "{{ post.url | relative_url }}",
    image: "{{ post.image | relative_url }}",
    date: "{{ post.date | date: "%b %-d, %Y" }}",
    excerpt: `{{ post.excerpt | strip_html | truncate: 100 | escape }}`,
    categories: [
      {% for cat in post.categories %}
        "{{ cat | slugify }}"{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ],
    category_name: "{{ post.categories[0] }}"
  },
  {% endfor %}
];

let filtered = hash
  ? allPosts.filter(p => p.categories.includes(hash))
  : allPosts;

document.getElementById("category-title").innerText =
  hash ? hash.toUpperCase() : "SEMUA KATEGORI";

const container = document.getElementById("post-list");
container.innerHTML = "";

if (filtered.length === 0) {
  container.innerHTML = `
    <div class="col-12 text-center text-muted py-5">
      Tidak ada postingan.
    </div>
  `;
} else {
  filtered.forEach(p => {
    container.innerHTML += `
      <div class="col-12 col-md-4">
        <div class="card border-0 h-100">

          <a href="${p.url}" class="text-decoration-none text-dark">

            <div class="position-relative">
              <img src="${p.image ? p.image : '/images/default.jpg'}"
                   class="w-100 rounded"
                   style="aspect-ratio:16/9; object-fit:cover;" loading="lazy">
            </div>

            <div class="mt-3">

              <div class="small text-danger fw-semibold mb-1">
                ${p.category_name}
              </div>

              <h4 class="fw-bold text-dark mb-1">
                ${p.title}
              </h4>

              <small class="text-muted d-block mb-1">
                ${p.date}
              </small>

              <p class="text-muted small mb-0">
                ${p.excerpt}
              </p>

            </div>

          </a>

        </div>
      </div>
    `;
  });
}
</script>

<script>
window.addEventListener("hashchange", () => location.reload());
</script>
